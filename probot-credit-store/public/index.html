<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>طلب كريدت ProBot</title>
<style>
body{font-family:Arial;background:#0b0f19;color:#fff;padding:20px}
.card{max-width:500px;margin:auto;background:#121a2a;padding:20px;border-radius:12px}
input{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #333;background:#0e1526;color:#fff}
button{margin-top:15px;width:100%;padding:10px;border-radius:8px;border:0;background:#3b82f6;color:#fff;font-weight:bold}
</style>
</head>
<body>
<div class="card">
<h2>طلب كريدت ProBot</h2>
<p>السعر 3.5 جنيه لكل مليون</p>

<input id="probotId" placeholder="ايدي ProBot"/>
<input id="millions" placeholder="عدد الملايين"/>
<input type="file" id="proof"/>

<button onclick="submitOrder()">تم</button>
<p id="msg"></p>
</div>

<script>
async function submitOrder(){
const fd = new FormData();
fd.append("probotId", document.getElementById("probotId").value);
fd.append("millions", document.getElementById("millions").value);
fd.append("proof", document.getElementById("proof").files[0]);

const res = await fetch("/api/order",{method:"POST",body:fd});
const data = await res.json();
document.getElementById("msg").innerText = data.ok ? "تم إرسال الطلب" : "حصل خطأ";
}
</script>
</body>
</html>
